name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
    - name: Search cache
      uses: Swatinem/rust-cache@v2.7.7
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
