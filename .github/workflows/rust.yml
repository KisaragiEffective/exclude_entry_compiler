name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
    - name: Search cache
      uses: Swatinem/rust-cache@v2.7.7
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
